<!-- ⭐ ESTRELLAS DE FONDO -->
<div id="stars"></div>

<style>
/* estrellas */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:.6;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
50%{opacity:.1;}
}

/* fondo movimiento suave */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle at center,rgba(255,50,120,0.15),transparent 60%);
animation:pulse 6s infinite;
}

@keyframes pulse{
50%{transform:scale(1.1); opacity:.7;}
}

/* flores capas */
.flower{
position:absolute;
font-size:20px;
opacity:.85;
animation:floatFlower linear infinite;
filter:drop-shadow(0 0 6px rgba(255,80,120,.4));
}

@keyframes floatFlower{
0%{transform:translateY(0) rotate(0);}
100%{transform:translateY(-120vh) rotate(360deg);}
}

/* carta mejora visual */
.letter{
box-shadow:0 30px 80px rgba(0,0,0,.6);
backdrop-filter:blur(2px);
}

/* sobre más “premium” */
.envelope{
border-radius:6px;
transform-style:preserve-3d;
}

/* corazones más suaves */
.heart{
opacity:.8;
filter:blur(0.2px);
}
</style>

<script>

/* ⭐ ESTRELLAS */
function createStars(){
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(s);
}
}
createStars();

/* 🌸 FLORES DINÁMICAS (más vida) */
function createFlower(){
let f=document.createElement("div");
const flowers=["🌸","🌺","🌷","🌼"];
f.innerHTML=flowers[Math.floor(Math.random()*flowers.length)];
f.className="flower";
f.style.left=Math.random()*100+"vw";
f.style.fontSize=(Math.random()*18+12)+"px";
f.style.animationDuration=(Math.random()*8+6)+"s";
document.body.appendChild(f);

setTimeout(()=>f.remove(),12000);
}
setInterval(createFlower,800);

/* ❤️ CORAZONES MÁS SUAVES */
function createHeart(){
let h=document.createElement("div");
h.innerHTML="❤";
h.style.position="absolute";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(Math.random()*22+10)+"px";
h.style.color="#ff3b7a";
h.style.animation="floatFlower 7s linear forwards";
h.style.opacity="0.8";

document.body.appendChild(h);
setTimeout(()=>h.remove(),9000);
}

/* mantener ritmo suave */
setInterval(createHeart,500);

</script>
